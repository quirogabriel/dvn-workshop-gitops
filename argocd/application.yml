apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capco-teste-tecnico
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/quirogabriel/devops-na-nuvem
    targetRevision: HEAD
    path: dvn-workshop-gitops
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true